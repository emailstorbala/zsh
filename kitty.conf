# Kitty Configuration

# ===== FONTS =====
font_family      JetBrainsMono Nerd Font Mono
font_size        16.5

# Enable ligatures for programming
disable_ligatures never

# Adjust line height and letter spacing
adjust_line_height  0
adjust_column_width 0

# Font rendering (make it lighter/thinner)
# Use slight hinting for better clarity
text_composition_strategy platform

# ===== CURSOR =====
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ===== SCROLLBACK =====
scrollback_lines 10000

# ===== MOUSE =====
mouse_hide_wait 3.0
copy_on_select yes
strip_trailing_spaces smart

# ===== TAB BAR =====
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
# Show shell prompt only after a small fade-in
shell_integration enabled

# Smooth scrolling for long outputs
smooth_scrolling yes

# Transparency blending with background image (optional)
# background_image ~/Pictures/wallpapers/minimal_dark.png
# background_image_layout scaled

# Minimal powerline symbols if available
symbol_map U+E0B0-U+E0B3 JetBrainsMono Nerd Font

# Show title in tab
tab_title_template "{index}: {title}"

# ===== ADVANCED =====
shell .
editor .
allow_remote_control yes
update_check_interval 0

# ===== PERFORMANCE =====
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ===== BELL =====
enable_audio_bell no
visual_bell_duration 0.0
# ===== OPTIONAL: Transparency =====
# Uncomment these if you want transparency
background_opacity 0.98
dynamic_background_opacity yes

# ===== KEYBINDINGS =====
# Standard clipboard operations
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Window management
map ctrl+shift+enter new_window
map ctrl+shift+w close_window
map ctrl+shift+n new_os_window

# Tab management
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward
map ctrl+shift+r set_tab_title

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
