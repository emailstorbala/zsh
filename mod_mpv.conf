############################
# AUDIO – SAFE & STABLE
############################

# Let mpv auto-negotiate channels
audio-channels=auto

# Bitstream only what AVR-2807 supports
audio-spdif=ac3,dts

# Allow fallback to PCM if passthrough fails
audio-spdif-output=no

# Do NOT downmix
audio-normalize-downmix=no

# Disable replaygain
replaygain=no

############################
# PIPEWIRE FRIENDLY
############################

audio-buffer=0.3
audio-wait-open=yes
